<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi Aquarium 🐠</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{overflow:hidden;background:#020810;font-family:'Segoe UI',system-ui,sans-serif;user-select:none}
  #c{display:block;position:fixed;top:0;left:0}

  /* 상단 바 */
  #top-bar{
    position:fixed;top:0;left:0;right:0;height:40px;
    background:transparent;
    border-bottom:none;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 16px;z-index:200;pointer-events:none;
    opacity:0.5;transition:opacity 0.4s;
  }
  #top-bar:hover{opacity:1}
  #top-bar>*{pointer-events:auto}
  #top-bar h1{
    color:rgba(140,200,255,0.8);font-size:15px;font-weight:500;
    letter-spacing:2px;
  }
  #top-bar .info{
    color:rgba(140,200,255,0.4);font-size:11px;letter-spacing:1px;
  }
  #online-count{color:rgba(100,220,180,0.7)}
  #fish-total{color:rgba(255,200,100,0.7)}

  /* 하단 컨트롤 */
  #bottom-bar{
    position:fixed;bottom:0;left:0;right:0;height:44px;
    background:transparent;
    border-top:none;
    display:flex;align-items:center;justify-content:center;gap:6px;
    padding:0 12px;z-index:200;pointer-events:none;
    opacity:0;transition:opacity 0.4s;
  }
  body:hover #bottom-bar{opacity:1}
  #bottom-bar>*{pointer-events:auto}
  .btn{
    background:rgba(60,140,200,0.1);backdrop-filter:blur(6px);
    border:1px solid rgba(100,180,255,0.12);border-radius:999px;
    color:rgba(150,210,255,0.6);font-family:inherit;
    font-size:11px;font-weight:500;letter-spacing:0.8px;
    padding:8px 18px;cursor:pointer;transition:all 0.3s;
    white-space:nowrap;
  }
  .btn:hover{background:rgba(60,140,200,0.25);color:rgba(180,230,255,0.9)}
  .btn.primary{
    background:rgba(60,180,120,0.15);border-color:rgba(100,220,160,0.2);
    color:rgba(130,230,170,0.8);
  }
  .btn.primary:hover{background:rgba(60,180,120,0.3);color:rgba(160,255,200,1)}

  /* 물고기 만들기 패널 */
  #creator-overlay{
    position:fixed;inset:0;background:rgba(2,8,16,0.7);
    backdrop-filter:blur(8px);z-index:300;
    display:none;align-items:center;justify-content:center;
  }
  #creator-overlay.open{display:flex}
  #creator-wrapper{
    display:flex;align-items:flex-start;gap:16px;
    max-width:95vw;max-height:90vh;
  }
  #creator{
    background:rgba(10,25,50,0.95);border:1px solid rgba(100,180,255,0.15);
    border-radius:20px;padding:28px;width:420px;max-width:55vw;
    max-height:85vh;overflow-y:auto;flex-shrink:0;
  }
  #preview-side{
    background:rgba(10,25,50,0.95);border:1px solid rgba(100,180,255,0.15);
    border-radius:20px;padding:20px;display:flex;flex-direction:column;
    align-items:center;gap:10px;flex-shrink:0;
    min-width:240px;
  }
  #preview-side h3{
    color:rgba(160,220,255,0.7);font-size:13px;font-weight:500;
    letter-spacing:1.5px;margin:0;
  }
  #preview-canvas{
    background:rgba(5,15,35,0.6);border:1px solid rgba(100,180,255,0.1);
    border-radius:12px;display:block;
    width:220px;height:180px;
  }
  #preview-species-name{
    color:rgba(140,200,255,0.5);font-size:11px;letter-spacing:1px;
  }
  @media (max-width:700px){
    #creator-wrapper{flex-direction:column;align-items:center}
    #creator{max-width:92vw}
    #preview-side{width:100%;flex-direction:row;justify-content:center;padding:14px}
  }
  #creator h2{
    color:rgba(160,220,255,0.85);font-size:16px;font-weight:500;
    letter-spacing:1.5px;margin-bottom:20px;text-align:center;
  }
  .form-group{margin-bottom:16px}
  .form-group label{
    display:block;color:rgba(140,200,255,0.5);font-size:11px;
    letter-spacing:1px;margin-bottom:6px;
  }
  .form-group input[type="text"]{
    width:100%;background:rgba(20,40,70,0.6);border:1px solid rgba(100,180,255,0.12);
    border-radius:10px;padding:10px 14px;color:rgba(200,230,255,0.9);
    font-family:inherit;font-size:13px;outline:none;
    transition:border-color 0.3s;
  }
  .form-group input[type="text"]:focus{border-color:rgba(100,180,255,0.35)}

  /* 크기 슬라이더 */
  .size-slider-row{display:flex;align-items:center;gap:12px}
  .size-slider-row input[type="range"]{
    flex:1;-webkit-appearance:none;appearance:none;height:4px;
    background:rgba(100,180,255,0.15);border-radius:2px;outline:none;
  }
  .size-slider-row input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
    background:rgba(100,200,255,0.7);cursor:pointer;
  }
  .size-slider-row .size-value{
    color:rgba(160,220,255,0.7);font-size:12px;min-width:28px;text-align:center;
  }

  /* 종 선택 그리드 */
  .species-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  }
  .species-card{
    background:rgba(20,40,70,0.4);border:2px solid rgba(100,180,255,0.08);
    border-radius:12px;padding:8px 4px;text-align:center;cursor:pointer;
    transition:all 0.3s;
  }
  .species-card:hover{background:rgba(30,60,100,0.5);border-color:rgba(100,180,255,0.2)}
  .species-card.selected{
    background:rgba(40,80,140,0.4);border-color:rgba(100,200,255,0.5);
  }
  .species-card canvas{display:block;margin:0 auto 4px;width:64px;height:48px}
  .species-card .name{
    color:rgba(160,210,255,0.6);font-size:9px;letter-spacing:0.5px;
  }

  /* 색상 선택 */
  .color-row{display:flex;gap:10px;flex-wrap:wrap}
  .color-pick{display:flex;flex-direction:column;align-items:center;gap:4px}
  .color-pick label{font-size:9px;color:rgba(140,200,255,0.4)}
  .color-pick input[type="color"]{
    width:36px;height:36px;border:2px solid rgba(100,180,255,0.15);
    border-radius:8px;background:transparent;cursor:pointer;
    padding:2px;
  }

  /* 로그인 모달 */
  #login-overlay{
    position:fixed;inset:0;background:rgba(2,8,16,0.85);
    backdrop-filter:blur(10px);z-index:500;
    display:flex;align-items:center;justify-content:center;
  }
  #login-overlay.hidden{display:none}
  #login-box{
    background:rgba(10,25,50,0.95);border:1px solid rgba(100,180,255,0.15);
    border-radius:20px;padding:32px;width:340px;max-width:90vw;text-align:center;
  }
  #register-box{
    background:rgba(10,25,50,0.95);border:1px solid rgba(100,180,255,0.15);
    border-radius:20px;padding:32px;width:340px;max-width:90vw;text-align:center;
  }
  #register-box h2{
    color:rgba(160,220,255,0.85);font-size:18px;font-weight:500;
    letter-spacing:2px;margin-bottom:6px;
  }
  #register-box .subtitle{
    color:rgba(140,200,255,0.4);font-size:11px;margin-bottom:22px;
  }
  #register-box input{
    width:100%;background:rgba(20,40,70,0.6);border:1px solid rgba(100,180,255,0.12);
    border-radius:10px;padding:10px 14px;color:rgba(200,230,255,0.9);
    font-family:inherit;font-size:13px;outline:none;margin-bottom:10px;
    transition:border-color 0.3s;
  }
  #register-box input:focus{border-color:rgba(100,180,255,0.35)}
  #reg-msg{
    color:rgba(255,120,120,0.8);font-size:11px;min-height:16px;margin-top:8px;
  }
  #reg-msg.success{color:rgba(120,255,160,0.8)}
  #login-box h2{
    color:rgba(160,220,255,0.85);font-size:18px;font-weight:500;
    letter-spacing:2px;margin-bottom:6px;
  }
  #login-box .subtitle{
    color:rgba(140,200,255,0.4);font-size:11px;margin-bottom:22px;
  }
  #login-box input{
    width:100%;background:rgba(20,40,70,0.6);border:1px solid rgba(100,180,255,0.12);
    border-radius:10px;padding:10px 14px;color:rgba(200,230,255,0.9);
    font-family:inherit;font-size:13px;outline:none;margin-bottom:10px;
    transition:border-color 0.3s;
  }
  #login-box input:focus{border-color:rgba(100,180,255,0.35)}
  #login-box .btn-row{display:flex;gap:8px;margin-top:14px}
  #login-box .btn-row .btn{flex:1}
  #login-msg{
    color:rgba(255,120,120,0.8);font-size:11px;min-height:16px;margin-top:8px;
  }
  #login-msg.success{color:rgba(120,255,160,0.8)}
  #login-skip{
    color:rgba(140,200,255,0.3);font-size:10px;margin-top:14px;
    cursor:pointer;transition:color 0.3s;
  }
  #login-skip:hover{color:rgba(140,200,255,0.6)}
  #user-info{
    display:flex;align-items:center;gap:8px;
  }
  #user-nickname{
    color:rgba(120,220,170,0.8);font-size:11px;letter-spacing:0.5px;
  }
  #btn-logout{
    background:none;border:1px solid rgba(255,120,120,0.2);border-radius:6px;
    color:rgba(255,140,140,0.5);font-size:9px;padding:3px 8px;cursor:pointer;
  }
  #btn-logout:hover{color:rgba(255,140,140,0.8);border-color:rgba(255,120,120,0.4)}

  /* 내 물고기 목록 */
  #my-fish-panel{
    position:fixed;right:0;top:48px;bottom:52px;width:220px;
    background:rgba(5,15,35,0.85);backdrop-filter:blur(12px);
    border-left:1px solid rgba(100,180,255,0.1);
    z-index:200;transform:translateX(100%);transition:transform 0.3s;
    overflow-y:auto;padding:16px 12px;
  }
  #my-fish-panel.open{transform:translateX(0)}
  #my-fish-panel h3{
    color:rgba(140,200,255,0.6);font-size:12px;letter-spacing:1px;
    margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;
  }
  #my-fish-panel .panel-close{
    background:none;border:none;color:rgba(140,200,255,0.5);font-size:16px;
    cursor:pointer;padding:2px 6px;border-radius:4px;
  }
  #my-fish-panel .panel-close:hover{color:#fff;background:rgba(255,255,255,0.1);}
  .my-fish-item{
    display:flex;align-items:center;gap:8px;
    padding:8px 10px;background:rgba(20,40,70,0.3);
    border:1px solid rgba(100,180,255,0.08);border-radius:10px;
    margin-bottom:6px;
  }
  .my-fish-item .fish-thumb{
    flex-shrink:0;width:60px;height:44px;
    background:rgba(5,15,35,0.5);border-radius:8px;
    border:1px solid rgba(100,180,255,0.08);display:block;
  }
  .my-fish-item .fish-info{
    flex:1;min-width:0;
  }
  .my-fish-item .fname{
    color:rgba(180,220,255,0.7);font-size:11px;
  }
  .my-fish-item .remove-btn{
    background:rgba(255,80,80,0.15);border:1px solid rgba(255,80,80,0.2);
    border-radius:6px;color:rgba(255,120,120,0.7);font-size:10px;
    padding:3px 8px;cursor:pointer;flex-shrink:0;
  }
  .my-fish-item .remove-btn:hover{background:rgba(255,80,80,0.3)}

  /* 토스트 알림 */
  #toast-container{
    position:fixed;top:60px;left:50%;transform:translateX(-50%);
    z-index:400;display:flex;flex-direction:column;gap:6px;align-items:center;
  }
  .toast{
    background:rgba(10,30,60,0.9);backdrop-filter:blur(10px);
    border:1px solid rgba(100,180,255,0.15);border-radius:999px;
    color:rgba(160,220,255,0.7);font-size:11px;letter-spacing:0.5px;
    padding:8px 18px;animation:toastIn 0.3s ease,toastOut 0.3s ease 2.5s forwards;
  }
  @keyframes toastIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  @keyframes toastOut{to{opacity:0;transform:translateY(-10px)}}
</style>
</head>
<body>

<!-- 상단 바 -->
<!-- 로그인 오버레이 -->
<div id="login-overlay">
  <!-- 로그인 화면 -->
  <div id="login-box">
    <h2>MULTI AQUARIUM</h2>
    <div class="subtitle">나만의 물고기를 만들어 공유 수조에 넣자</div>
    <input type="password" id="login-pw" placeholder="PIN 번호 입력" maxlength="8" inputmode="numeric" style="text-align:center;font-size:18px;letter-spacing:8px">
    <button class="btn primary" id="btn-login" style="width:100%;margin-top:4px">로그인</button>
    <div id="login-msg"></div>
    <div id="login-to-register" style="color:rgba(140,200,255,0.4);font-size:11px;margin-top:14px;cursor:pointer">
      처음이신가요? <span style="color:rgba(140,200,255,0.7);text-decoration:underline">회원가입</span>
    </div>
    <div id="login-skip">비회원으로 구경하기</div>
  </div>
  <!-- 회원가입 화면 -->
  <div id="register-box" style="display:none">
    <h2>회원가입</h2>
    <div class="subtitle">닉네임과 PIN 번호를 설정하세요</div>
    <input type="text" id="reg-nick" placeholder="닉네임" maxlength="20">
    <input type="password" id="reg-pw" placeholder="PIN 번호 (4~8자리 숫자)" maxlength="8" inputmode="numeric" style="text-align:center;font-size:18px;letter-spacing:8px">
    <input type="password" id="reg-pw2" placeholder="PIN 번호 확인" maxlength="8" inputmode="numeric" style="text-align:center;font-size:18px;letter-spacing:8px">
    <button class="btn primary" id="btn-register" style="width:100%;margin-top:4px">가입하기</button>
    <div id="reg-msg"></div>
    <div id="reg-to-login" style="color:rgba(140,200,255,0.4);font-size:11px;margin-top:14px;cursor:pointer">
      이미 계정이 있으신가요? <span style="color:rgba(140,200,255,0.7);text-decoration:underline">로그인</span>
    </div>
  </div>
</div>

<div id="top-bar">
  <h1>MULTI AQUARIUM</h1>
  <div style="display:flex;align-items:center;gap:14px">
    <div class="info">
      <span id="online-count">0</span> 접속 &nbsp;│&nbsp;
      <span id="fish-total">0</span> 마리
    </div>
    <div id="user-info" style="display:none">
      <span id="user-nickname"></span>
      <button id="btn-logout">로그아웃</button>
    </div>
  </div>
</div>

<!-- 캔버스 -->
<canvas id="c"></canvas>

<!-- 하단 바 -->
<div id="bottom-bar">
  <button class="btn primary" id="btn-create">+ 물고기 만들기</button>
  <button class="btn" id="btn-feed">먹이주기 (F)</button>
  <button class="btn" id="btn-my-fish">내 물고기</button>
  <button class="btn" id="btn-random">야생 물고기 (A)</button>
  <button class="btn" id="btn-jelly">해파리 (J)</button>
  <button class="btn" id="btn-theme">테마: 산호초 (T)</button>
  <button class="btn" id="btn-night">야간모드 (N)</button>
</div>

<!-- 물고기 만들기 패널 -->
<div id="creator-overlay">
  <div id="creator-wrapper">
    <div id="creator">
      <h2>나만의 물고기 만들기</h2>

      <div class="form-group">
        <label>닉네임</label>
        <input type="text" id="input-owner" placeholder="당신의 이름" maxlength="20">
      </div>
      <div class="form-group">
        <label>물고기 이름</label>
        <input type="text" id="input-fishname" placeholder="물고기 이름을 지어주세요" maxlength="20">
      </div>

      <div class="form-group">
        <label>종류 선택</label>
        <div class="species-grid" id="species-grid"></div>
      </div>

      <div class="form-group">
        <label>크기</label>
        <div class="size-slider-row">
          <span style="color:rgba(140,200,255,0.4);font-size:10px">작게</span>
          <input type="range" id="input-size" min="0" max="100" value="50">
          <span style="color:rgba(140,200,255,0.4);font-size:10px">크게</span>
          <span class="size-value" id="size-value">50</span>
        </div>
      </div>

      <div class="form-group">
        <label>색상 커스텀</label>
        <div class="color-row">
          <div class="color-pick">
            <input type="color" id="color-body" value="#FF6B35">
            <label>몸통</label>
          </div>
          <div class="color-pick">
            <input type="color" id="color-fin" value="#FF9F1C">
            <label>지느러미</label>
          </div>
          <div class="color-pick">
            <input type="color" id="color-belly" value="#FFE0B2">
            <label>배</label>
          </div>
          <div class="color-pick">
            <input type="color" id="color-accent" value="#FFFFFF">
            <label>포인트</label>
          </div>
        </div>
      </div>

      <div style="display:flex;gap:10px;justify-content:center">
        <button class="btn" id="btn-cancel">취소</button>
        <button class="btn primary" id="btn-submit">수조에 넣기!</button>
      </div>
    </div>

    <div id="preview-side">
      <h3>미리보기</h3>
      <canvas id="preview-canvas" width="220" height="180"></canvas>
      <div id="preview-species-name">클라운피시</div>
    </div>
  </div>
</div>

<!-- 내 물고기 패널 -->
<div id="my-fish-panel">
  <h3>내 물고기 <button class="panel-close" id="btn-close-fish-panel">&times;</button></h3>
  <div id="my-fish-list"></div>
</div>

<!-- 토스트 -->
<div id="toast-container"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
// ── 소켓 ──
const socket = io();

// ── 캔버스 설정 ──
const cv = document.getElementById('c');
const ctx = cv.getContext('2d');
let W, H;
const resize = () => {
  W = cv.width = innerWidth;
  H = cv.height = innerHeight;
};
resize();
addEventListener('resize', resize);

// ── 유틸리티 ──
const rand = (a,b) => Math.random()*(b-a)+a;
const pick = a => a[Math.floor(Math.random()*a.length)];
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,mn,mx) => Math.max(mn,Math.min(mx,v));
const dist = (x1,y1,x2,y2) => Math.hypot(x2-x1,y2-y1);
const TAU = Math.PI * 2;

// ── 상태 ──
let mx = W/2, my = H/2;
let nightMode = false;
let time = 0;
let frameCount = 0;
let currentTheme = 1;

const THEMES = [
  {
    name: '기본',
    sky: ['#020C18','#041828','#062438','#0A3050'],
    night: ['#010408','#020810','#030C18','#051020'],
    light: 'rgba(100,200,255,',
    sand: ['rgba(30,50,60,0.6)','rgba(40,65,75,0.9)'],
    sandNight: ['rgba(15,25,30,0.8)','rgba(20,30,35,1)'],
    sandTex: 'rgba(60,85,95,0.25)',
    sandTexNight: 'rgba(40,55,60,0.3)',
  },
  {
    name: '산호초',
    sky: ['#021A2E','#053555','#0C5070','#18708A'],
    night: ['#010D18','#021828','#042838','#083848'],
    light: 'rgba(140,230,220,',
    sand: ['rgba(60,50,35,0.6)','rgba(90,75,55,0.9)'],
    sandNight: ['rgba(25,22,18,0.8)','rgba(35,30,22,1)'],
    sandTex: 'rgba(100,85,65,0.3)',
    sandTexNight: 'rgba(50,42,32,0.3)',
  },
  {
    name: '심해',
    sky: ['#000208','#010410','#020618','#030820'],
    night: ['#000105','#000208','#010310','#010418'],
    light: 'rgba(60,100,180,',
    sand: ['rgba(15,20,30,0.7)','rgba(20,25,35,0.95)'],
    sandNight: ['rgba(8,10,18,0.8)','rgba(12,15,22,1)'],
    sandTex: 'rgba(30,35,50,0.3)',
    sandTexNight: 'rgba(18,22,35,0.3)',
  },
  {
    name: '열대',

  // 12: 해파리
  {
    name:'해파리',
    bodyW:0.4, bodyH:0.5, sizeRange:[20,50],
    isJellyfish: true,
    defaultColors: {body:'#B48CFF',fin:'#C8A0FF',belly:'#D4B0FF',accent:'#E8D0FF'},
    jellyPalettes: [
      {body:'#B48CFF',fin:'#C8A0FF',belly:'#D4B0FF',accent:'#E8D0FF'},
      {body:'#FF8CB4',fin:'#FFA0C8',belly:'#FFB0D4',accent:'#FFD0E8'},
      {body:'#8CDCFF',fin:'#A0E6FF',belly:'#B0ECFF',accent:'#D0F4FF'},
      {body:'#8CFFC8',fin:'#A0FFDC',belly:'#B0FFE4',accent:'#D0FFF0'},
      {body:'#FFDC8C',fin:'#FFE6A0',belly:'#FFECB0',accent:'#FFF4D0'},
    ],
    draw(ctx, sz, p, tw, fw, t) {
      // 해파리 고유 색상 (반투명 rgba 변환)
      const hexToRgb = (hex) => {
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        return `${r},${g},${b}`;
      };
      const bodyRgb = hexToRgb(p.body);
      const finRgb = hexToRgb(p.fin);
      const bellyRgb = hexToRgb(p.belly);

      const pulse = Math.sin(t * 2);
      const squeeze = 1 + pulse * 0.15;
      const stretch = 1 - pulse * 0.1;
      const bellBottom = sz * 0.15 * stretch;

      // 글로우
      const glowR = sz * 1.5;
      const gg = ctx.createRadialGradient(0, -sz*0.15, 0, 0, -sz*0.1, glowR);
      gg.addColorStop(0, `rgba(${bodyRgb},0.15)`);
      gg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(0, -sz*0.1, glowR, 0, TAU); ctx.fill();

      // 촉수들
      const tentacles = 10;
      for (let i = 0; i < tentacles; i++) {
        const spread = sz * 0.38 * squeeze;
        const tx = (i - (tentacles-1)/2) / ((tentacles-1)/2) * spread * 0.8;
        const len = sz * 2.5;
        ctx.beginPath();
        ctx.moveTo(tx, bellBottom);
        for (let j = 1; j <= 8; j++) {
          const frac = j / 8;
          const wave = Math.sin(t * (1 + i*0.2) + i * 0.8 + frac * 4) * sz * 0.12 * frac * (0.5 + i*0.1);
          ctx.lineTo(tx + wave, bellBottom + frac * len);
        }
        ctx.strokeStyle = `rgba(${bodyRgb},0.2)`;
        ctx.lineWidth = clamp(sz * 0.025, 0.5, 2.5);
        ctx.stroke();
      }

      // 메인 촉수 4개
      for (let i = 0; i < 4; i++) {
        const spread = sz * 0.3 * squeeze;
        const tx = (i - 1.5) / 1.5 * spread * 0.6;
        const len = sz * 2.5 * 1.4;
        ctx.beginPath();
        ctx.moveTo(tx, bellBottom);
        for (let j = 1; j <= 12; j++) {
          const frac = j / 12;
          const wave = Math.sin(t * 1.2 + i * 2 + frac * 5) * sz * 0.2 * frac;
          ctx.lineTo(tx + wave, bellBottom + frac * len);
        }
        ctx.strokeStyle = `rgba(${bodyRgb},0.2)`;
        ctx.lineWidth = clamp(sz * 0.04, 0.8, 3.5);
        ctx.stroke();
      }

      // 벨 (우산)
      ctx.save();
      ctx.scale(squeeze, stretch);
      const bellGrad = ctx.createRadialGradient(0, -sz*0.15, 0, 0, -sz*0.05, sz*0.5);
      bellGrad.addColorStop(0, `rgba(${bellyRgb},0.5)`);
      bellGrad.addColorStop(0.6, `rgba(${bodyRgb},0.3)`);
      bellGrad.addColorStop(1, 'rgba(255,255,255,0.05)');
      ctx.fillStyle = bellGrad;
      ctx.beginPath();
      ctx.moveTo(-sz*0.4, sz*0.15);
      ctx.bezierCurveTo(-sz*0.45, -sz*0.15, -sz*0.3, -sz*0.5, 0, -sz*0.55);
      ctx.bezierCurveTo(sz*0.3, -sz*0.5, sz*0.45, -sz*0.15, sz*0.4, sz*0.15);
      for (let i = 0; i < 8; i++) {
        const frac = 1 - i / 8;
        const fx = sz * 0.4 * (2*frac - 1);
        const fy = sz * 0.15 + Math.sin(t * 3 + i * 1.2) * sz * 0.025;
        ctx.quadraticCurveTo(fx + sz*0.05, fy + sz*0.04, fx, fy);
      }
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();

      // 내부 기관
      ctx.fillStyle = `rgba(${bellyRgb},0.5)`;
      ctx.globalAlpha *= 0.6;
      ctx.beginPath();
      ctx.ellipse(0, -sz*0.18, sz*0.15, sz*0.1, 0, 0, TAU);
      ctx.fill();
      ctx.strokeStyle = `rgba(${bellyRgb},0.5)`;
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 4; i++) {
        const a = i * TAU / 4 + t * 0.5;
        ctx.beginPath();
        ctx.moveTo(0, -sz*0.18);
        ctx.quadraticCurveTo(Math.cos(a)*sz*0.12, -sz*0.05, Math.cos(a+0.5)*sz*0.08, sz*0.05);
        ctx.stroke();
      }
      ctx.restore();

      // 하이라이트
      ctx.globalAlpha *= 0.6;
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.ellipse(-sz*0.1, -sz*0.35, sz*0.08, sz*0.06, -0.4, 0, TAU);
      ctx.fill();
    }
  },
  // 13: 만타가오리
  {

      // 배(아래쪽) - 밝은 색, 크고 유연하게 흘러내림

      ctx.beginPath();
      ctx.moveTo(sz*0.45, sz*0.02);

      ctx.lineTo(sz*0.45, sz*0.02);
      ctx.closePath(); ctx.fill();

      // 점무늬 (등 쪽에만)
      ctx.fillStyle = p.belly + 'CC';
      const dots = [
        [0.3,-0.06],[0.2,-0.12],[0.08,-0.18],[-0.02,-0.22],[-0.15,-0.25],
        [0.25,-0.1],[0.12,-0.16],[-0.08,-0.24],[-0.22,-0.26],[-0.35,-0.22],

        ctx.fill();
      }

      // 아가미 슬릿 (배 쪽)
      ctx.strokeStyle = p.accent + '55';
      ctx.lineWidth = sz * 0.007;
      for(let i = 0; i < 3; i++) {
        const gx = sz * (0.05 - i * 0.06);
        ctx.beginPath();
        ctx.moveTo(gx, sz*0.1);
        ctx.lineTo(gx, sz*0.16);
        ctx.stroke();
      }

      // 머리 뿔 (위로 솟은 두 귀처럼, 귀여운 느낌)
      ctx.fillStyle = p.body;
      ctx.beginPath();
      ctx.moveTo(sz*0.4, -sz*0.04);
      ctx.bezierCurveTo(sz*0.44, -sz*0.1, sz*0.48, -sz*0.16, sz*0.5, -sz*0.14);

      ctx.beginPath();

      ctx.bezierCurveTo(sz*0.38, -sz*0.12, sz*0.42, -sz*0.18, sz*0.44, -sz*0.16);

  // 14: 범고래

      ctx.bezierCurveTo(-sz*0.32, -sz*0.24, -sz*0.3, -sz*0.14, -sz*0.2, -sz*0.06);
      ctx.bezierCurveTo(-sz*0.1, -sz*0.01, 0, 0, sz*0.04, 0);
      ctx.closePath(); ctx.fill();
      // 아래 갈래
      ctx.beginPath();
      ctx.moveTo(sz*0.04, 0);
      ctx.bezierCurveTo(0, sz*0.06, -sz*0.12, sz*0.2, -sz*0.28, sz*0.26);
      ctx.bezierCurveTo(-sz*0.32, sz*0.24, -sz*0.3, sz*0.14, -sz*0.2, sz*0.06);

      ctx.beginPath();

      ctx.bezierCurveTo(-sz*0.14, -sz*0.05, -sz*0.06, -sz*0.01, 0, 0);
      ctx.closePath(); ctx.fill();
      ctx.restore();

      ctx.moveTo(-sz*0.08, -sz*0.32);
      ctx.bezierCurveTo(-sz*0.04, -sz*0.48, sz*0.02, -sz*0.65, sz*0.08, -sz*0.7);

      // 꼬리 연결
      ctx.bezierCurveTo(-sz*0.74, 0, -sz*0.74, 0, -sz*0.72, sz*0.02);
      // 배~꼬리

      ctx.fillStyle = p.belly;
      ctx.beginPath();
      // 턱 앞

      // 턱 아래

      // 배 중앙
      ctx.bezierCurveTo(sz*0.05, sz*0.28, -sz*0.15, sz*0.25, -sz*0.3, sz*0.18);
      // 배 뒤쪽

class Fish {
  constructor(data) {
    const si = data.speciesIdx !== undefined ? data.speciesIdx : Math.floor(rand(0, SPECIES.length));
    this.species = SPECIES[si];
    this.speciesIdx = si;
    this.isJellyfish = this.species.isJellyfish || false;
    this.id = data.id;
    this.ownerId = data.ownerId;
    this.ownerName = data.ownerName || '익명';
    this.fishName = data.name || '이름없음';
    this.x = (data.rx != null ? data.rx * W : null) ?? data.x ?? rand(100, W-100);
    this.y = (data.ry != null ? data.ry * H : null) ?? data.y ?? rand(120, H-200);
    if(data.rx != null) { this.remoteX = data.rx * W; this.remoteY = data.ry * H; this.lastRemoteUpdate = Date.now(); }
    this.palette = data.customColors || this.species.defaultColors;
    const sr = this.species.sizeRange;
    this.size = (data.size != null) ? data.size : rand(sr[0], sr[1]);
    this.speed = this.isJellyfish ? rand(0.15, 0.4) : rand(0.4, 1.2);
    this.dir = data.dir || (Math.random()>0.5?1:-1);
    this.vx = this.isJellyfish ? 0 : this.speed*this.dir;
    this.vy = this.isJellyfish ? -this.speed : rand(-0.2,0.2);
    // 해파리 전용
    this.pulsePhase = rand(0, TAU);
    this.pulseSpeed = rand(1.2, 2.5);
    this.driftPhase = rand(0, TAU);
    this.targetVx = this.vx;
    this.targetVy = this.vy;
    this.turnCooldown = rand(2,8);
    this.tailPhase = rand(0,TAU);
    this.tailSpeed = rand(3,6);
    this.finPhase = rand(0,TAU);
    this.chasingFood = null;
    this.wanderAngle = rand(0,TAU);
    this.z = (data.z != null) ? data.z : rand(0.6,1.2);
    this.actualSize = this.size*this.z;
    this.opacity = this.isJellyfish ? (0.3 + this.z * 0.35) : (0.5+this.z*0.4);
    this.mouthOpen = 0;
    this.blinkTimer = rand(3,8);
    this.blinking = false;
    this.blinkDuration = 0;
    this.showName = false;
    this.nameTimer = 0;
    // 임시 물고기 (A키로 생성) 수명
    this.temporary = data.temporary || false;
    this.lifespan = data.lifespan || (data.temporary ? rand(15, 30) : Infinity);
    this.age = 0;
    this.dying = false; // 거품 사라짐 중
    this.dyingProgress = 0;
    this.dead = false;
    this.deathBubbles = []; // 사라질 때 생성되는 거품들
  }

  update(dt) {
    const s = dt*60;
    this.tailPhase += this.tailSpeed*dt;
    this.finPhase += 4*dt;
    this.blinkTimer -= dt;
    if(this.blinkTimer<=0&&!this.blinking){this.blinking=true;this.blinkDuration=0.15;}
    if(this.blinking){this.blinkDuration-=dt;if(this.blinkDuration<=0){this.blinking=false;this.blinkTimer=rand(3,10);}}
    if(this.nameTimer>0) this.nameTimer -= dt;
    else this.showName = false;

    // 거품 사라짐 진행 (dying은 서버 fishRemoved에서 시작됨)
    if(this.dying) {
      this.dyingProgress += dt * 0.5; // ~2초에 걸쳐 사라짐
      if(this.dyingProgress >= 1) this.dead = true;
    }

    // 다른 유저 소유 물고기는 수신 위치로 lerp (AI 비활성)
    // 단, 3초 이상 업데이트 없으면 자체 AI로 전환
    if(this.ownerId !== myUid && this.remoteX != null) {
      if(this.lastRemoteUpdate && (Date.now() - this.lastRemoteUpdate > 3000)) {
        this.remoteX = null;
        this.remoteY = null;
      } else {
        this.x = lerp(this.x, this.remoteX, 0.12 * s);
        this.y = lerp(this.y, this.remoteY, 0.12 * s);
        return;
      }
    }

    if(this.isJellyfish) {
      // 해파리 전용 움직임
      this.pulsePhase += this.pulseSpeed * dt;
      this.driftPhase += 0.3 * dt;
      const pulse = Math.sin(this.pulsePhase);
      this.vy = -this.speed * (0.5 + 0.5 * Math.max(0, -pulse));
      this.vx = Math.sin(this.driftPhase) * 0.2;
      // 커서 회피
      const curDist = dist(this.x, this.y, mx, my);
      if(curDist < 60) {
        const angle = Math.atan2(this.y - my, this.x - mx);
        const flee = (60 - curDist) / 60;
        this.vx += Math.cos(angle) * flee * 0.3;
        this.vy += Math.sin(angle) * flee * 0.1;
      }
      this.x += this.vx * s;
      this.y += this.vy * s;
      // 화면 밖으로 나가면 아래에서 다시 등장
      if(this.y < -this.actualSize * 3) this.y = H + this.actualSize;
      if(this.y > H + this.actualSize * 2) this.y = -this.actualSize * 2;
      this.x = clamp(this.x, 20, W - 20);
    } else {
      // 물고기 움직임
      if(this.chasingFood&&this.chasingFood.eaten) this.chasingFood=null;
      if(this.chasingFood){
        const f=this.chasingFood, dx=f.x-this.x, dy=f.y-this.y, d=Math.hypot(dx,dy);
        if(d<this.actualSize*0.5){f.eaten=true;this.chasingFood=null;this.mouthOpen=0.3;setTimeout(()=>this.mouthOpen=0,300);}
        else{this.targetVx=(dx/d)*this.speed*2.5;this.targetVy=(dy/d)*this.speed*2.5;this.dir=this.targetVx>0?1:-1;}
      } else {
        this.turnCooldown-=dt;
        if(this.turnCooldown<=0){
          this.wanderAngle+=rand(-0.8,0.8);
          this.targetVx=Math.cos(this.wanderAngle)*this.speed;
          this.targetVy=Math.sin(this.wanderAngle)*this.speed*0.4;
          if(Math.abs(this.targetVx)>0.1)this.dir=this.targetVx>0?1:-1;
          this.turnCooldown=rand(2,6);
        }
        if(foods.length>0 && (frameCount+this.id)%FOOD_SEARCH_INTERVAL===0){
          let closest=null,closestDist=300;
          for(let fi=0;fi<foods.length;fi++){const f=foods[fi];if(f.eaten)continue;const dx=f.x-this.x,dy=f.y-this.y,d=Math.sqrt(dx*dx+dy*dy);if(d<closestDist){closest=f;closestDist=d;}}
          if(closest)this.chasingFood=closest;
        }
      }
      const margin=80;
      if(this.x<margin)this.targetVx=Math.abs(this.targetVx);
      if(this.x>W-margin)this.targetVx=-Math.abs(this.targetVx);
      if(this.y<margin){
        const push=0.3+(margin-this.y)/margin*0.5;
        this.targetVy=Math.max(this.targetVy,push);
      }
      if(this.y>H-140){
        const push=0.3+(this.y-(H-140))/140*0.5;
        this.targetVy=Math.min(this.targetVy,-push);
      }

      // 마우스 회피
      const curDist=dist(this.x,this.y,mx,my);
      if(curDist<70&&!this.chasingFood){
        const angle=Math.atan2(this.y-my,this.x-mx);
        const flee = (70-curDist)/70;
        this.targetVx+=Math.cos(angle)*flee*1.2;
        this.targetVy+=Math.sin(angle)*flee*0.3;
        this.tailSpeed=8;
      } else { this.tailSpeed=lerp(this.tailSpeed,rand(3,6),0.02); }
      const nearEdge=(this.y<margin||this.y>H-140)?0.08:0.03;
      this.vx=lerp(this.vx,this.targetVx,0.03*s);
      this.vy=lerp(this.vy,this.targetVy,nearEdge*s);
      this.x+=this.vx*s; this.y+=this.vy*s;
      this.x=clamp(this.x,20,W-20); this.y=clamp(this.y,20,H-80);
      if(Math.abs(this.vx)>0.05)this.dir=this.vx>0?1:-1;
    }
  }

  drawDeathBubbles(dt) {
    for(let i = this.deathBubbles.length - 1; i >= 0; i--) {
      const b = this.deathBubbles[i];
      b.y += b.vy;
      b.x += b.vx + Math.sin(time * 3 + i) * 0.3;
      b.opacity -= 0.008;
      if(b.opacity <= 0) { this.deathBubbles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = b.opacity;
      const g = ctx.createRadialGradient(b.x - b.size*0.3, b.y - b.size*0.3, 0, b.x, b.y, b.size);
      g.addColorStop(0, 'rgba(180,230,255,0.2)');
      g.addColorStop(0.7, 'rgba(120,200,255,0.1)');
      g.addColorStop(1, 'rgba(100,180,255,0.25)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, TAU); ctx.fill();
      ctx.strokeStyle = 'rgba(160,220,255,0.35)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.beginPath();
      ctx.ellipse(b.x - b.size*0.25, b.y - b.size*0.25, b.size*0.2, b.size*0.15, -0.5, 0, TAU);
      ctx.fill();
      ctx.restore();
    }
  }

  draw() {
    // 거품 사라짐 중이면 거품만 그리기
    if(this.dying) {
      // 사라지는 동안 물고기를 축소+투명하게
      const fadeOut = 1 - this.dyingProgress;
      if(fadeOut > 0) {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.globalAlpha = this.opacity * fadeOut * fadeOut;
        ctx.scale(fadeOut, fadeOut);
        // 떨림 효과
        ctx.translate(rand(-2,2), rand(-2,2));
        this._drawBody();
        ctx.restore();
      }
      this.drawDeathBubbles();
      return;
    }

    ctx.save();
    ctx.translate(this.x, this.y);
    this._drawBody();
    ctx.restore();
  }

  _drawBody() {
    // 이름 표시 (호버 또는 생성 직후)
    if(this.showName || this.nameTimer > 0){
      ctx.save();
      ctx.globalAlpha = Math.min(1, this.nameTimer > 0 ? this.nameTimer : 0.8);
      ctx.fillStyle = 'rgba(10,25,50,0.7)';
      ctx.font = '10px system-ui';
      const nameText = `${this.fishName} (${this.ownerName})`;
      const tw = ctx.measureText(nameText).width;
      const px = -tw/2, py = -this.actualSize - 18;
      ctx.beginPath();
      ctx.roundRect(px-6, py-10, tw+12, 16, 8);
      ctx.fill();
      ctx.fillStyle = 'rgba(180,220,255,0.85)';
      ctx.fillText(nameText, px, py);
      ctx.restore();
    }

    if(!this.isJellyfish) ctx.scale(this.dir, 1);
    ctx.globalAlpha = this.opacity;
    const sz = this.actualSize;
    const tw2 = Math.sin(this.tailPhase)*0.3;
    const fw = Math.sin(this.finPhase)*0.2;

    if(this.isJellyfish || this.species.customDraw) {
      // 해파리/특수 종은 종 draw만 호출 (눈/입/광택 자체 처리)
      this.species.draw(ctx, sz, this.palette, tw2, fw, time);
    } else {
      const bodyStretch = 1+Math.abs(this.vx)*0.02;
      ctx.scale(bodyStretch, 1/bodyStretch);

      this.species.draw(ctx, sz, this.palette, tw2, fw, time);

      // 광택
      const shG = ctx.createRadialGradient(sz*0.1,-sz*0.1,0,sz*0.1,-sz*0.1,sz*0.25);
      shG.addColorStop(0,'rgba(255,255,255,0.25)');
      shG.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle=shG;
      ctx.beginPath(); ctx.ellipse(sz*0.1,-sz*0.08,sz*0.2,sz*0.12,-0.2,0,TAU); ctx.fill();

      // 눈
      const bw = this.species.bodyW||0.5;
      const eyeX = sz*(bw-0.1);
      const eyeY = -sz*0.06;
      const eyeR = sz*0.07;
      ctx.fillStyle='#FAFAFA';
      ctx.beginPath(); ctx.ellipse(eyeX,eyeY,eyeR,eyeR*0.95,0,0,TAU); ctx.fill();
      if(!this.blinking){
        ctx.fillStyle='#1A1A2E';
        ctx.beginPath(); ctx.arc(eyeX+1,eyeY,eyeR*0.55,0,TAU); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,0.8)';
        ctx.beginPath(); ctx.arc(eyeX+eyeR*0.2,eyeY-eyeR*0.25,eyeR*0.25,0,TAU); ctx.fill();
      } else {
        ctx.strokeStyle='#1A1A2E'; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(eyeX-eyeR,eyeY); ctx.lineTo(eyeX+eyeR,eyeY); ctx.stroke();
      }

      // 입
      const mx2 = sz*(bw+0.05);
      const my2 = sz*0.04;
      if(this.mouthOpen>0){
        ctx.fillStyle='#2A1A3A';
        ctx.beginPath(); ctx.arc(mx2,my2,sz*0.035,0,TAU); ctx.fill();
      } else {
        ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.8;
        ctx.beginPath(); ctx.moveTo(mx2-sz*0.02,my2);
        ctx.quadraticCurveTo(mx2,my2+sz*0.02,mx2+sz*0.015,my2);
        ctx.stroke();
      }
    } // if(!isJellyfish) 끝
  }
}

// ══════════════════════
// ── 기포, 먹이, 수초, 산호 ──
// ══════════════════════
class Bubble {
  constructor(x,y,size){
    this.x=x||rand(50,W-50);this.y=y||H+10;this.size=size||rand(2,8);
    this.speed=rand(0.3,1)*(8/(this.size+2));this.wobblePhase=rand(0,TAU);
    this.wobbleSpeed=rand(1.5,3);this.wobbleAmp=rand(0.3,1.2);this.opacity=rand(0.3,0.7);this.popped=false;
  }
  update(dt){
    const s=dt*60;this.y-=this.speed*s;this.wobblePhase+=this.wobbleSpeed*dt;
    this.x+=Math.sin(this.wobblePhase)*this.wobbleAmp;
    if(this.y<-20)this.popped=true;
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.opacity;
    const g=ctx.createRadialGradient(this.x-this.size*0.3,this.y-this.size*0.3,0,this.x,this.y,this.size);
    g.addColorStop(0,'rgba(180,230,255,0.15)');g.addColorStop(0.7,'rgba(120,200,255,0.08)');g.addColorStop(1,'rgba(100,180,255,0.2)');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,TAU);ctx.fill();
    ctx.strokeStyle='rgba(160,220,255,0.3)';ctx.lineWidth=0.5;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.5)';ctx.beginPath();
    ctx.ellipse(this.x-this.size*0.25,this.y-this.size*0.25,this.size*0.2,this.size*0.15,-0.5,0,TAU);ctx.fill();
    ctx.restore();
  }
}

class Food {
  constructor(x,y){
    this.x=x;this.y=y;this.vy=0.3;this.size=rand(2,4);this.wobblePhase=rand(0,TAU);
    this.eaten=false;this.opacity=1;this.color=pick(['#FFD700','#FFA500','#FF8C42','#E8A87C']);
  }
  update(dt){
    const s=dt*60;this.y+=this.vy*s;this.wobblePhase+=2*dt;this.x+=Math.sin(this.wobblePhase)*0.3;
    if(this.y>H-80){this.opacity-=0.005*s;if(this.opacity<=0)this.eaten=true;}
  }
  draw(){
    ctx.save();ctx.globalAlpha=this.opacity;ctx.fillStyle=this.color;
    ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,TAU);ctx.fill();
    ctx.globalAlpha=this.opacity*0.3;ctx.fillStyle='#FFF';
    ctx.beginPath();ctx.arc(this.x-this.size*0.2,this.y-this.size*0.3,this.size*0.4,0,TAU);ctx.fill();
    ctx.restore();
  }
}

class Seaweed {
  constructor(x){
    this.x=x;this.baseY=H;this.segments=Math.floor(rand(6,14));this.segLen=rand(14,25);
    this.phase=rand(0,TAU);this.speed=rand(0.5,1.2);this.width=rand(4,10);
    this.color1=pick(['#1B5E20','#2E7D32','#388E3C','#0D4A0D','#145A32']);
    this.color2=pick(['#4CAF50','#66BB6A','#81C784','#A5D6A7']);
    this.z=rand(0.7,1.3);
  }
  draw(){
    ctx.save();ctx.globalAlpha=0.7*clamp(this.z,0.5,1);
    const pts=[{x:this.x,y:this.baseY}];
    for(let i=1;i<=this.segments;i++){
      const t=i/this.segments;
      const sway=Math.sin(this.phase+time*this.speed+i*0.5)*(15*t);
      pts.push({x:this.x+sway,y:this.baseY-i*this.segLen});
    }
    ctx.beginPath();ctx.moveTo(pts[0].x-this.width/2,pts[0].y);
    for(let i=1;i<pts.length;i++){const t=i/(pts.length-1);const w=this.width*(1-t*0.6);ctx.lineTo(pts[i].x-w/2,pts[i].y);}
    for(let i=pts.length-1;i>=0;i--){const t=i/(pts.length-1);const w=this.width*(1-t*0.6);ctx.lineTo(pts[i].x+w/2,pts[i].y);}
    ctx.closePath();
    const g=ctx.createLinearGradient(this.x,this.baseY,this.x,this.baseY-this.segments*this.segLen);
    g.addColorStop(0,this.color1);g.addColorStop(1,this.color2);ctx.fillStyle=g;ctx.fill();
    ctx.restore();
  }
}

class Coral {
  constructor(x){
    this.x=x;this.y=H;this.type=Math.floor(rand(0,3));this.size=rand(25,55);
    this.color=pick(['#FF6B6B','#EE5A24','#F8B500','#6C5CE7','#E056A0','#00B894','#FDA7DF']);
    this.z=rand(0.7,1.2);
    this.branches=[];
    if(this.type===0){for(let i=0;i<7;i++)this.branches.push({angle:-Math.PI/2+(i-3)*0.22,len:this.size*rand(0.7,1)});}
    else if(this.type===2){for(let i=0;i<5;i++)this.branches.push({bx:(i-2)*this.size*0.25,h:this.size*rand(0.5,1),w:this.size*0.12});}
  }
  draw(){
    ctx.save();ctx.globalAlpha=0.6*clamp(this.z,0.5,1);
    const sz=this.size;
    if(this.type===0){
      for(const b of this.branches){
        ctx.strokeStyle=this.color;ctx.lineWidth=3;ctx.lineCap='round';
        ctx.beginPath();ctx.moveTo(this.x,this.y);
        const ex=this.x+Math.cos(b.angle)*b.len;
        const ey=this.y+Math.sin(b.angle)*b.len;
        ctx.lineTo(ex,ey);ctx.stroke();
        ctx.fillStyle=this.color+'88';
        ctx.beginPath();ctx.arc(ex,ey,4,0,TAU);ctx.fill();
      }
    } else if(this.type===1){
      ctx.fillStyle=this.color+'BB';
      ctx.beginPath();ctx.ellipse(this.x,this.y-sz*0.3,sz*0.4,sz*0.3,0,Math.PI,0);ctx.fill();
      ctx.fillStyle=this.color+'77';
      ctx.beginPath();ctx.ellipse(this.x-sz*0.15,this.y-sz*0.15,sz*0.25,sz*0.2,0.3,Math.PI,0);ctx.fill();
    } else {
      for(const b of this.branches){
        ctx.fillStyle=this.color+'AA';
        ctx.beginPath();
        ctx.roundRect(this.x+b.bx-b.w/2, this.y-b.h, b.w, b.h, [b.w/2,b.w/2,0,0]);
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

// ══════════════════════
// ── 초기화 ──
// ══════════════════════
const fishes = [];
let fishSortDirty = true;
let lastFishCount = 0;
const bubbles = [];
const foods = [];
const seaweeds = [];
const corals = [];

// 환경 생성
function initEnvironment() {
  seaweeds.length = 0;
  corals.length = 0;
  for(let i=0;i<Math.floor(W/80);i++) seaweeds.push(new Seaweed(rand(30,W-30)));
  for(let i=0;i<Math.floor(W/150);i++) corals.push(new Coral(rand(60,W-60)));
}
initEnvironment();
addEventListener('resize', () => { resize(); initEnvironment(); });

// 기포 자동 생성
setInterval(() => {
  if(bubbles.length<60) bubbles.push(new Bubble());
}, 300);

// ══════════════════════
// ── 마우스 & 입력 ──
// ══════════════════════
// 커서 전송 쓰로틀 (100ms)
let lastCursorSend = 0;
function sendCursor(x, y) {
  const now = Date.now();
  if(now - lastCursorSend > 100) {
    socket.emit('cursor', { x: x/W, y: y/H, name: myName || '익명' });
    lastCursorSend = now;
  }
}

let lastHoverCheck = 0;
addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; const now=Date.now(); if(now-lastHoverCheck>150){checkFishHover();lastHoverCheck=now;} sendCursor(mx,my); });
addEventListener('touchmove', e => { mx=e.touches[0].clientX; my=e.touches[0].clientY; sendCursor(mx,my); });

addEventListener('click', e => {
  // UI 영역 클릭 무시
  if(e.target.closest('#top-bar,#bottom-bar,#creator-overlay,#my-fish-panel')) return;
  // 먹이 주기
  dropFood(e.clientX, e.clientY);
});

function dropFood(x, y) {
  foods.push(new Food(x, y));
  socket.emit('feed', { x, y, ownerName: myName });
}

function spawnRandomFish() {
  // 해파리 제외한 종에서 랜덤 선택
  const fishSpecies = SPECIES.filter(s => !s.isJellyfish);
  const si = SPECIES.indexOf(pick(fishSpecies));
  const sp = SPECIES[si];
  const sr = sp.sizeRange;
  const lifespan = rand(15, 30);
  socket.emit('addFish', {
    uid: myUid,
    ownerName: myName || '익명',
    name: sp.name,
    speciesIdx: si,
    customColors: sp.defaultColors,
    size: rand(sr[0], sr[1]),
    z: rand(0.6, 1.2),
    x: rand(100, W - 100),
    y: rand(120, H - 200),
    dir: Math.random() > 0.5 ? 1 : -1,
    temporary: true,
    lifespan: lifespan
  });
}

function spawnRandomJellyfish() {
  const jellyIdx = SPECIES.findIndex(s => s.isJellyfish);
  const sp = SPECIES[jellyIdx];
  const sr = sp.sizeRange;
  const lifespan = rand(20, 40);
  // 랜덤 해파리 색상
  const palette = pick(sp.jellyPalettes);
  socket.emit('addFish', {
    uid: myUid,
    ownerName: myName || '익명',
    name: '해파리',
    speciesIdx: jellyIdx,
    customColors: palette,
    size: rand(sr[0], sr[1]),
    z: rand(0.5, 1.2),
    x: rand(100, W - 100),
    y: rand(H * 0.3, H * 0.7),
    dir: 1,
    temporary: true,
    lifespan: lifespan
  });
}

function checkFishHover() {
  for(const f of fishes){
    const d = dist(f.x, f.y, mx, my);
    if(d < f.actualSize + 10){
      f.showName = true;
      f.nameTimer = 2;
    }
  }
}

addEventListener('keydown', e => {
  if(e.target.tagName === 'INPUT') return;
  if(e.key === 'f' || e.key === 'F') dropFood(mx, my);
  if(e.key === 'a' || e.key === 'A') spawnRandomFish();
  if(e.key === 'j' || e.key === 'J') spawnRandomJellyfish();
  if(e.key === 't' || e.key === 'T') cycleTheme();
  if(e.key === 'n' || e.key === 'N') nightMode = !nightMode;
});

// ══════════════════════
// ── 렌더 루프 ──
// ══════════════════════
let lastTime = performance.now();

function drawBackground() {
  const th = THEMES[currentTheme];
  const nightMul = nightMode ? 0.4 : 1;
  const colors = nightMode ? th.night : th.sky;

  // 바다 그라데이션
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, colors[0]);
  bg.addColorStop(0.33, colors[1]);
  bg.addColorStop(0.66, colors[2]);
  bg.addColorStop(1, colors[3]);
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,W,H);

  // 빛줄기
  ctx.save();
  const lightCount = nightMode ? 2 : 5;
  for(let i=0;i<lightCount;i++){
    const lx = W*0.1 + i*(W*0.2) + Math.sin(time*0.3+i)*30;
    const lw = 40+Math.sin(time*0.5+i*1.5)*15;
    const lg = ctx.createLinearGradient(lx,0,lx,H*0.7);
    lg.addColorStop(0, th.light + (0.04*nightMul) + ')');
    lg.addColorStop(1, th.light + '0)');
    ctx.fillStyle=lg;
    ctx.beginPath();
    ctx.moveTo(lx-lw,0);ctx.lineTo(lx+lw,0);
    ctx.lineTo(lx+lw*1.5,H*0.7);ctx.lineTo(lx-lw*1.5,H*0.7);
    ctx.closePath();ctx.fill();
  }
  ctx.restore();

  // 심해 테마: 생물발광 파티클
  if(currentTheme === 2) {
    ctx.save();
    for(let i = 0; i < 15; i++) {
      const px = (Math.sin(time*0.2 + i*2.3) * 0.5 + 0.5) * W;
      const py = (Math.cos(time*0.15 + i*1.7) * 0.5 + 0.5) * H * 0.8;
      const pr = 1.5 + Math.sin(time*2 + i) * 0.8;
      const alpha = 0.15 + Math.sin(time*1.5 + i*0.9) * 0.1;
      const colors2 = ['80,140,255','100,255,200','200,100,255','255,180,80'];
      const c = colors2[i % 4];
      ctx.fillStyle = `rgba(${c},${alpha * nightMul})`;
      ctx.beginPath(); ctx.arc(px, py, pr, 0, TAU); ctx.fill();
      // 글로우
      const gg = ctx.createRadialGradient(px,py,0,px,py,pr*6);
      gg.addColorStop(0, `rgba(${c},${alpha*0.3*nightMul})`);
      gg.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = gg;
      ctx.beginPath(); ctx.arc(px, py, pr*6, 0, TAU); ctx.fill();
    }
    ctx.restore();
  }

  // 석양 테마: 상단에 따뜻한 빛
  if(currentTheme === 4) {
    ctx.save();
    const sunG = ctx.createRadialGradient(W*0.7, 0, 0, W*0.7, 0, H*0.5);
    sunG.addColorStop(0, `rgba(255,120,60,${0.08*nightMul})`);
    sunG.addColorStop(0.5, `rgba(255,80,40,${0.03*nightMul})`);
    sunG.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sunG;
    ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // 바닥 모래
  const sandColors = nightMode ? th.sandNight : th.sand;
  const sandG = ctx.createLinearGradient(0,H-80,0,H);
  sandG.addColorStop(0,'rgba(20,40,50,0)');
  sandG.addColorStop(0.3, sandColors[0]);
  sandG.addColorStop(1, sandColors[1]);
  ctx.fillStyle=sandG;
  ctx.fillRect(0,H-80,W,80);

  // 모래 질감
  ctx.fillStyle = nightMode ? th.sandTexNight : th.sandTex;
  for(let i=0;i<W;i+=rand(5,12)){
    const sy = H-rand(5,65);
    ctx.beginPath(); ctx.arc(i,sy,rand(0.5,1.5),0,TAU); ctx.fill();
  }
}

function animate(now) {
  requestAnimationFrame(animate);
  const dt = Math.min((now-lastTime)/1000, 0.05);
  lastTime = now;
  time += dt;
  frameCount++;

  drawBackground();

  // 수초 & 산호
  for(const sw of seaweeds) sw.draw();
  for(const co of corals) co.draw();

  // 먹이
  for(let i=foods.length-1;i>=0;i--){
    foods[i].update(dt);
    if(foods[i].eaten) foods.splice(i,1);
    else foods[i].draw();
  }

  // 물고기
  for(const f of fishes){ f.update(dt); }
  // 죽은 임시 물고기 제거
  for(let i = fishes.length - 1; i >= 0; i--) {
    if(fishes[i].dead && fishes[i].deathBubbles.length === 0) { fishById.delete(fishes[i].id); fishes.splice(i, 1); fishSortDirty = true; }
  }
  // z 기반 정렬 (물고기 추가/제거 시에만)
  if(fishSortDirty) { fishes.sort((a,b) => a.z - b.z); fishSortDirty = false; }
  for(const f of fishes){ f.draw(); }

  // 기포
  for(let i=bubbles.length-1;i>=0;i--){
    bubbles[i].update(dt);
    if(bubbles[i].popped) bubbles.splice(i,1);
    else bubbles[i].draw();
  }

  // 다른 유저 커서 그리기
  const cursorNow = Date.now();
  for(const [id, c] of remoteCursors) {
    // 5초 이상 업데이트 없으면 제거
    if(cursorNow - c.lastSeen > 5000) { remoteCursors.delete(id); continue; }
    // 부드럽게 보간
    c.x = lerp(c.x, c.targetX, 0.15);
    c.y = lerp(c.y, c.targetY, 0.15);
    // 리사이즈 대응
    c.targetX = c.targetX; // 비율은 이벤트에서 갱신됨

    ctx.save();
    ctx.globalAlpha = 0.7;
    // 물방울 커서
    const pulse = 1 + Math.sin(time * 3 + id.charCodeAt(0)) * 0.15;
    const r = 8 * pulse;
    const grd = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, r);
    grd.addColorStop(0, 'rgba(100,220,255,0.5)');
    grd.addColorStop(0.6, 'rgba(80,180,255,0.25)');
    grd.addColorStop(1, 'rgba(60,140,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath(); ctx.arc(c.x, c.y, r, 0, TAU); ctx.fill();
    // 중심 점
    ctx.fillStyle = 'rgba(150,230,255,0.8)';
    ctx.beginPath(); ctx.arc(c.x, c.y, 2.5, 0, TAU); ctx.fill();
    // 닉네임
    ctx.font = '10px system-ui';
    ctx.fillStyle = 'rgba(140,210,255,0.7)';
    ctx.fillText(c.name, c.x + 12, c.y + 4);
    ctx.restore();
  }

  // 수면 효과
  ctx.save();
  ctx.globalAlpha = nightMode ? 0.02 : 0.05;
  for(let i=0;i<3;i++){
    const y = 48 + i*3 + Math.sin(time*0.8+i)*2;
    ctx.strokeStyle = 'rgba(120,200,255,0.5)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    for(let x=0;x<W;x+=20){
      ctx.lineTo(x, y + Math.sin(x*0.02+time*1.5+i)*3);
    }
    ctx.stroke();
  }
  ctx.restore();

  // UI 업데이트 (변경 시에만)
  if(lastFishCount !== fishes.length) { document.getElementById('fish-total').textContent = fishes.length; lastFishCount = fishes.length; }
}

const remoteCursors = new Map();
socket.on('cursorMoved', (data) => {
  let cursor = remoteCursors.get(data.id);
  if(!cursor) {
    cursor = { x: data.x*W, y: data.y*H, targetX: data.x*W, targetY: data.y*H, name: data.name, lastSeen: Date.now() };
    remoteCursors.set(data.id, cursor);
  }
  cursor.targetX = data.x * W;
  cursor.targetY = data.y * H;
  cursor.name = data.name;
  cursor.lastSeen = Date.now();
});
socket.on('cursorLeft', (id) => {

});

    fishById.set(fish.id, fish);
  }
  fishSortDirty = true;
  updateMyFishList();
});

socket.on('fishAdded', (data) => {
  // 이미 있는지 확인
  if(fishById.has(data.id)) return;
  const fish = new Fish(data);
  fish.nameTimer = 4;
  fish.showName = true;
  fishes.push(fish);
  fishById.set(fish.id, fish);

});

// 물고기 ID → 인덱스 빠른 조회용 맵
const fishById = new Map();
function rebuildFishMap() {
  fishById.clear();
  for(let i = 0; i < fishes.length; i++) fishById.set(fishes[i].id, fishes[i]);
}

// 다른 클라이언트에서 보낸 물고기 위치 수신
socket.on('fishPositions', (updates) => {
  for(const u of updates) {
    const fish = fishById.get(u.id);
    if(fish && fish.ownerId !== myUid) {
      fish.remoteX = u.x * W;
      fish.remoteY = u.y * H;
      fish.dir = u.dir;
      fish.lastRemoteUpdate = Date.now();
    }
  }
});

socket.on('fishRemoved', (fishId) => {
  const fish = fishById.get(fishId);
  if(!fish) return;
  if(fish.temporary && !fish.dying) {
    // 거품 사라짐 애니메이션 시작 (바로 제거하지 않음)
    fish.dying = true;
    fish.dyingProgress = 0;
    for(let i = 0; i < 12; i++) {
      fish.deathBubbles.push({
        x: fish.x + rand(-fish.actualSize, fish.actualSize) * 0.5,
        y: fish.y + rand(-fish.actualSize, fish.actualSize) * 0.5,
        size: rand(2, 6),
        vy: rand(-0.5, -1.5),
        vx: rand(-0.3, 0.3),
        opacity: rand(0.5, 0.9)
      });
    }
  } else {
    const idx = fishes.indexOf(fish);
    if(idx >= 0) { fishById.delete(fish.id); fishes.splice(idx, 1); fishSortDirty = true; }
  }
  updateMyFishList();
});

socket.on('foodDropped', (data) => {
  // 다른 사람이 준 먹이
  if(!foods.find(f => f.x === data.x && f.y === data.y)){
    foods.push(new Food(data.x, data.y));

function getCustomColors() {
  return {
    body: document.getElementById('color-body').value,
    fin: document.getElementById('color-fin').value,
    belly: document.getElementById('color-belly').value,
    accent: document.getElementById('color-accent').value
  };
}

function updatePreview() {
  const pCtx = previewCtx;
  const pw = 220, ph = 180;
  pCtx.clearRect(0,0,pw,ph);
  // 배경
  const bg = pCtx.createLinearGradient(0,0,0,ph);
  bg.addColorStop(0,'#041828');bg.addColorStop(1,'#0A3050');
  pCtx.fillStyle=bg;pCtx.fillRect(0,0,pw,ph);

  pCtx.save();
  pCtx.translate(pw/2, ph/2);
  pCtx.globalAlpha = 0.95;
  const sp = SPECIES[selectedSpecies];
  const sizeVal = parseInt(document.getElementById('input-size').value);
  const sz = 20 + (sizeVal / 100) * 35;
  const colors = getCustomColors();
  const t = time;
  const tw = Math.sin(t*4)*0.3;
  const fw = Math.sin(t*3)*0.2;
  sp.draw(pCtx, sz, colors, tw, fw, t);
  // 눈
  const bw = sp.bodyW||0.5;
  const eyeX = sz*(bw-0.1), eyeY = -sz*0.06, eyeR = sz*0.07;
  pCtx.fillStyle='#FAFAFA';
  pCtx.beginPath(); pCtx.ellipse(eyeX,eyeY,eyeR,eyeR*0.95,0,0,TAU); pCtx.fill();
  pCtx.fillStyle='#1A1A2E';
  pCtx.beginPath(); pCtx.arc(eyeX+1,eyeY,eyeR*0.55,0,TAU); pCtx.fill();
  pCtx.fillStyle='rgba(255,255,255,0.8)';
  pCtx.beginPath(); pCtx.arc(eyeX+eyeR*0.2,eyeY-eyeR*0.25,eyeR*0.25,0,TAU); pCtx.fill();
  pCtx.restore();

  // 종 이름 업데이트
  document.getElementById('preview-species-name').textContent = sp.name;
}

function cycleTheme() {
  currentTheme = (currentTheme + 1) % THEMES.length;
  document.getElementById('btn-theme').textContent = `테마: ${THEMES[currentTheme].name} (T)`;
}
document.getElementById('btn-theme').addEventListener('click', cycleTheme);
document.getElementById('btn-night').addEventListener('click', () => {
  nightMode = !nightMode;
  document.getElementById('btn-night').classList.toggle('active', nightMode);
});

// 내 물고기 패널
const myFishPanel = document.getElementById('my-fish-panel');
document.getElementById('btn-my-fish').addEventListener('click', () => {
  myFishPanel.classList.toggle('open');
});
document.getElementById('btn-close-fish-panel').addEventListener('click', () => {
  myFishPanel.classList.remove('open');
});

function updateMyFishList() {
  const list = document.getElementById('my-fish-list');
  const myFish = fishes.filter(f => f.ownerId === myUid && !f.temporary);
  list.innerHTML = '';
  if(myFish.length === 0){
    list.innerHTML = '<div style="color:rgba(140,200,255,0.3);font-size:11px;text-align:center;padding:20px">아직 물고기가 없습니다</div>';
    return;
  }
  for(const f of myFish){
    const sizePercent = Math.round(((f.size - f.species.sizeRange[0]) / (f.species.sizeRange[1] - f.species.sizeRange[0])) * 100);
    const item = document.createElement('div');
    item.className = 'my-fish-item';

    // 썸네일 canvas
    const thumb = document.createElement('canvas');
    thumb.className = 'fish-thumb';
    thumb.width = 120;
    thumb.height = 88;

    const info = document.createElement('div');
    info.className = 'fish-info';
    info.innerHTML = `
      <div class="fname">${f.fishName}</div>
      <div style="color:rgba(140,200,255,0.35);font-size:9px;margin-top:2px">
        ${f.species.name} · 크기 ${sizePercent}%
      </div>
    `;

    const removeBtn = document.createElement('button');
    removeBtn.className = 'remove-btn';
    removeBtn.textContent = '회수';
    removeBtn.addEventListener('click', () => {
      socket.emit('removeFish', { fishId: f.id, uid: myUid });
    });

    item.appendChild(thumb);
    item.appendChild(info);
    item.appendChild(removeBtn);
    list.appendChild(item);

    // 썸네일 그리기
    const tc = thumb.getContext('2d');
    const tw = thumb.width, th = thumb.height;
    const sz = Math.min(tw, th) * 0.32;
    tc.save();
    tc.translate(tw / 2, th / 2);
    // 해파리가 아니면 오른쪽을 바라보게
    if(!f.species.isJellyfish) tc.scale(1, 1);
    f.species.draw(tc, sz, f.palette, 0, 0, 0);
    if(!f.species.isJellyfish) {
      // 광택
      const shG = tc.createRadialGradient(sz*0.1,-sz*0.1,0,sz*0.1,-sz*0.1,sz*0.25);
      shG.addColorStop(0,'rgba(255,255,255,0.25)');
      shG.addColorStop(1,'rgba(255,255,255,0)');
      tc.fillStyle=shG;
      tc.beginPath(); tc.ellipse(sz*0.1,-sz*0.08,sz*0.2,sz*0.12,-0.2,0,Math.PI*2); tc.fill();
      // 눈
      const bw = f.species.bodyW||0.5;
      const eyeX=sz*(bw-0.1), eyeY=-sz*0.06, eyeR=sz*0.07;
      tc.fillStyle='#FAFAFA';
      tc.beginPath(); tc.ellipse(eyeX,eyeY,eyeR,eyeR*0.95,0,0,Math.PI*2); tc.fill();
      tc.fillStyle='#1A1A2E';
      tc.beginPath(); tc.arc(eyeX+1,eyeY,eyeR*0.55,0,Math.PI*2); tc.fill();
      tc.fillStyle='rgba(255,255,255,0.8)';
      tc.beginPath(); tc.arc(eyeX+eyeR*0.2,eyeY-eyeR*0.25,eyeR*0.25,0,Math.PI*2); tc.fill();
    }
    tc.restore();
  }
}

// 내 물고기 위치 주기적 전송 (500ms, 변화 있을 때만)
const lastSentPos = new Map();
setInterval(() => {
  const myFish = fishes.filter(f => f.ownerId === myUid && !f.dying && !f.dead);
  if(myFish.length === 0) return;
  const updates = [];
  for(const f of myFish) {
    const rx = Math.round(f.x/W * 1000) / 1000;
    const ry = Math.round(f.y/H * 1000) / 1000;
    const key = f.id;
    const prev = lastSentPos.get(key);
    if(!prev || Math.abs(prev.x - rx) > 0.002 || Math.abs(prev.y - ry) > 0.002 || prev.dir !== f.dir) {
      updates.push({ id: f.id, x: rx, y: ry, dir: f.dir });
      lastSentPos.set(key, { x: rx, y: ry, dir: f.dir });
    }
  }
  if(updates.length > 0) socket.emit('fishPositions', updates);
}, 500);

// 토스트 알림
function showToast(msg) {
  const container = document.getElementById('toast-container');
  const toast = document.createElement('div');
  toast.className = 'toast';
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
</script>
